name: Build Vitruvian ISO

on: [push]

jobs:
  iso-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bison build-essential cmake debootstrap debhelper \
            dh-dkms dkms elfutils flex git \
            grub-efi-amd64-bin grub-pc-bin \
            libdrm-dev libelf-dev libfl-dev libfreetype6-dev \
            libgif-dev libicns-dev libicu-dev libinput-dev \
            libjpeg-dev libncurses-dev libopenexr-dev libpng-dev \
            libtiff-dev libudev-dev libwebp-dev \
            linux-headers-$(uname -r) \
            mtools ninja-build squashfs-tools sudo xorriso zlib1g-dev \
            fakeroot devscripts lintian wget qemu-system-x86

      - name: Configure git safe.directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Create build directory
        run: mkdir generated.x86

      - name: Init submodules
        run: git submodule update --init --recursive

      - name: Setup environment
        run: cd generated.x86 && export TERM=xterm-256color && ../build/scripts/setupenv.sh

      - name: Configure
        run: cd generated.x86 && ../configure

      - name: Ninja build
        run: cd generated.x86 && ninja

      - name: Generate deb packages
        run: cd generated.x86 && cpack

      - name: Make mkiso script executable
        run: chmod +x ./build/scripts/mkiso.sh

      - name: Run mkiso script
        run: cd generated.x86 && ../build/scripts/mkiso.sh
      
      - name: Test ISO Boot
        run: |
          set -e
          ISO_FILE=$(find generated.x86/LIVE_BOOT -maxdepth 1 -name "*.iso")
          if [ -z "$ISO_FILE" ]; then
            echo "::error::File ISO non trovato!"
            exit 1
          fi
          echo "Avvio del test di boot per: $ISO_FILE"
          
          # Esegue QEMU in background, salvando l'output su un file di log.
          # L'opzione '|| true' previene l'errore del job se timeout termina QEMU.
          timeout 600s qemu-system-x86_64 -m 2G -nographic -cdrom "$ISO_FILE" &> qemu_boot.log || true
          
          echo "Output del boot di QEMU:"
          cat qemu_boot.log

          # Controlla se il prompt di login è presente nel log.
          if grep -i "login:" qemu_boot.log; then
            echo "Test di boot superato: prompt di login trovato."
          else
            echo "::error::Test di boot fallito: prompt di login non trovato."
            exit 1
          fi

      # Generate checksums for ISO
      - name: Generate ISO checksum
        run: |
          cd generated.x86/LIVE_BOOT
          for iso in *.iso; do
            sha265sum "$iso" > "$iso.sha256"
          done

      # Upload ISO and checksum
      - name: Upload Vitruvian ISO
        uses: actions/upload-artifact@v4
        with:
          name: Vitruvian-ISO
          path: |
            generated.x86/LIVE_BOOT/*.iso
            generated.x86/LIVE_BOOT/*.sha256

      # Generate checksums for DEB packages
      - name: Generate DEB checksums
        run: |
          cd generated.x86
          for deb in *.deb; do
            sha256sum "$deb" > "$deb.sha256"
          done

      # Upload DEB packages and checksums
      - name: Upload Vitruvian DEB packages
        uses: actions/upload-artifact@v4
        with:
          name: Vitruvian-DEB
          path: |
            generated.x86/*.deb
            generated.x86/*.sha256

