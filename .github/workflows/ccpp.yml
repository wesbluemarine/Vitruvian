name: Build and Test Vitruvian ISO

on: [push]

jobs:
  iso-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bison build-essential cmake debootstrap debhelper \
            dh-dkms dkms elfutils flex git \
            grub-efi-amd64-bin grub-pc-bin \
            libdrm-dev libelf-dev libfl-dev libfreetype6-dev \
            libgif-dev libicns-dev libicu-dev libinput-dev \
            libjpeg-dev libncurses-dev libopenexr-dev libpng-dev \
            libtiff-dev libudev-dev libwebp-dev \
            linux-headers-$(uname -r) \
            mtools ninja-build squashfs-tools sudo xorriso zlib1g-dev \
            fakeroot devscripts lintian wget qemu-system-x86

      - name: Configure git safe.directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Create build directory
        run: mkdir generated.x86

      - name: Init submodules
        run: git submodule update --init --recursive

      - name: Setup environment
        run: cd generated.x86 && export TERM=xterm-256color && ../build/scripts/setupenv.sh

      - name: Configure
        run: cd generated.x86 && ../configure

      - name: Ninja build
        run: cd generated.x86 && ninja

      - name: Generate deb packages
        run: cd generated.x86 && cpack

      # -------------------------------
      # Add systemd unit BOOT_OK marker
      # -------------------------------
      - name: Add BOOT_OK systemd unit
        run: |
          cat > boot-ok.service <<'EOF'
          [Unit]
          Description=Boot OK Marker
          After=multi-user.target

          [Service]
          Type=oneshot
          ExecStart=/bin/sh -c 'echo BOOT_OK >&2; echo BOOT_OK > /dev/ttyS0'

          [Install]
          WantedBy=multi-user.target
          EOF

          sudo cp boot-ok.service generated.x86/LIVE_BOOT/chroot/etc/systemd/system/
          sudo chroot generated.x86/LIVE_BOOT/chroot /bin/bash -c "systemctl enable boot-ok.service"

      - name: Make mkiso script executable
        run: chmod +x ./build/scripts/mkiso.sh

      - name: Run mkiso script
        run: cd generated.x86 && ../build/scripts/mkiso.sh

      # -------------------------------
      # Test ISO with QEMU
      # -------------------------------
      - name: Extract kernel and initrd from ISO
        run: |
          mkdir mnt
          ISO=$(ls generated.x86/LIVE_BOOT/*.iso | head -n1)
          echo "Using ISO: $ISO"
          sudo mount -o loop "$ISO" mnt
          cp mnt/vmlinuz ./vmlinuz
          cp mnt/initrd ./initrd
          sudo umount mnt

      - name: Boot ISO kernel with QEMU (headless)
        run: |
          timeout 90s qemu-system-x86_64 \
            -m 1024 \
            -nographic -serial stdio \
            -kernel ./vmlinuz \
            -initrd ./initrd \
            -append "boot=live console=ttyS0" | tee boot.log

      - name: Check boot result
        run: |
          if grep -q "BOOT_OK" boot.log; then
            echo "✅ ISO booted successfully to multi-user.target"
          else
            echo "❌ Boot did not reach BOOT_OK marker"
            exit 1
          fi

      # -------------------------------
      # Upload artifacts (only if test passed)
      # -------------------------------
      - name: Generate ISO checksum
        run: |
          cd generated.x86/LIVE_BOOT
          for iso in *.iso; do
            sha256sum "$iso" > "$iso.sha256"
          done

      - name: Upload Vitruvian ISO
        uses: actions/upload-artifact@v4
        with:
          name: Vitruvian-ISO
          path: |
            generated.x86/LIVE_BOOT/*.iso
            generated.x86/LIVE_BOOT/*.sha256

      - name: Generate DEB checksums
        run: |
          cd generated.x86
          for deb in *.deb; do
            sha256sum "$deb" > "$deb.sha256"
          done

      - name: Upload Vitruvian DEB packages
        uses: actions/upload-artifact@v4
        with:
          name: Vitruvian-DEB
          path: |
            generated.x86/*.deb
            generated.x86/*.sha256
